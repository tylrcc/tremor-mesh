name: Feature request / idea
description: Propose an improvement to the mesh
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or pain point, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
